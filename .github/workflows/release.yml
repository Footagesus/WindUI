# .github/workflows/release.yml
name: Release

on:
    push:
        tags:
            - "*"

jobs:
    release:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Install dependencies
              run: npm install

            - name: Build
              run: npm run build

            - name: Get version from tag
              id: version
              run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

            - name: Get changelog
              id: changelog
              run: |
                  if [ -f changelog.md ]; then
                    content=$(tail -n +2 changelog.md | sed '/^$/d' | head -c 10000)
                    echo "content<<EOF" >> $GITHUB_OUTPUT
                    echo "$content" >> $GITHUB_OUTPUT
                    echo "EOF" >> $GITHUB_OUTPUT
                  else
                    echo "content=No changelog provided." >> $GITHUB_OUTPUT
                  fi

            - name: Get main file from package.json
              id: package
              run: |
                  if [ -f package.json ]; then
                    main=$(cat package.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('main','main.lua'))")
                    echo "main=$main" >> $GITHUB_OUTPUT
                  else
                    echo "main=main.lua" >> $GITHUB_OUTPUT
                  fi

            - name: Create Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.version.outputs.version }}
                  name: ${{ steps.version.outputs.version }}
                  body: ${{ steps.changelog.content }}
                  draft: false
                  prerelease: false
                  files: ${{ steps.package.outputs.main }}
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Send Discord notification
              if: ${{ env.DISCORD_WEBHOOK != '' }}
              env:
                  DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
                  DISCORD_ROLE_ID: ${{ secrets.DISCORD_ROLE_ID }}
              run: |
                  VERSION="${{ steps.version.outputs.version }}"
                  URL="https://github.com/${{ github.repository }}/releases/tag/$VERSION"
                  CONTENT=$(cat changelog.md | tail -n +2 | head -c 1000)
                  DESCRIPTION=$(echo "$CONTENT" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")

                  # Пинг роли только если DISCORD_ROLE_ID задан
                  if [ -n "$DISCORD_ROLE_ID" ]; then
                    MENTION="\"<@&$DISCORD_ROLE_ID>\""
                  else
                    MENTION="null"
                  fi

                  curl -s -X POST "$DISCORD_WEBHOOK" \
                    -H "Content-Type: application/json" \
                    -d "{
                      \"content\": $MENTION,
                      \"embeds\": [{
                        \"title\": \"New release: $VERSION\",
                        \"description\": $DESCRIPTION,
                        \"color\": 3211114,
                        \"url\": \"$URL\",
                        \"author\": {
                          \"name\": \"${{ github.repository }}\",
                          \"url\": \"https://github.com/${{ github.repository }}\",
                          \"icon_url\": \"https://raw.githubusercontent.com/Footagesus/WindUI/main/docs/logo.png\"
                        }
                      }]
                    }"
